<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstergo Corp - Online Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.5rem; }
        nav a { color: #e0e0e0; text-decoration: none; margin-left: 1.5rem; }
        .hero { background: #16213e; color: #fff; text-align: center; padding: 4rem 1rem; }
        .hero h2 { font-size: 2rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.1rem; color: #ccc; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; padding: 2rem; max-width: 1000px; margin: auto; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; text-align: center; }
        .card h3 { margin-bottom: 0.5rem; }
        .card p { color: #555; margin-bottom: 1rem; }
        .card button { background: #e94560; color: #fff; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; }
        footer { background: #1a1a2e; color: #aaa; text-align: center; padding: 1rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <header>
        <h1>Abstergo Corp</h1>
        <nav><a href="#">Home</a><a href="#">Products</a><a href="#">Contact</a></nav>
    </header>
    <section class="hero">
        <h2>Welcome to Abstergo Online Store</h2>
        <p>Now with faster delivery and exclusive deals!</p>
    </section>
    <section class="products">
        <div class="card"><h3>Product A</h3><p>$29.99</p><button>Add to Cart</button></div>
        <div class="card"><h3>Product B</h3><p>$49.99</p><button>Add to Cart</button></div>
        <div class="card"><h3>Product C</h3><p>$19.99</p><button>Add to Cart</button></div>
    </section>
    <footer>&copy; 2024 Abstergo Corp. All rights reserved.</footer>
</body>
</html>
