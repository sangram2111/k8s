apiVersion: apps/v1
kind: Deployment
metadata:
  name: abstergo-website
  namespace: default
  labels:
    app: abstergo-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abstergo-website
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: abstergo-website
    spec:
      imagePullSecrets:
        - name: dockerhub-pull-secret
      containers:
        - name: abstergo-website
          image: DOCKER_HUB_USER/abstergo-website:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
