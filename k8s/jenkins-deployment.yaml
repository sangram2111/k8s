apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      initContainers:
        - name: install-kubectl
          image: jenkins/jenkins:lts
          securityContext:
            runAsUser: 0
          command:
            - bash
            - -c
            - |
              curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl
              cp kubectl /tools/kubectl
          volumeMounts:
            - name: tools
              mountPath: /tools
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          securityContext:
            runAsUser: 0
          ports:
            - containerPort: 8080
            - containerPort: 50000
          env:
            - name: PATH
              value: /tools:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: tools
              mountPath: /tools
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: jenkins-home
          emptyDir: {}
        - name: tools
          emptyDir: {}
